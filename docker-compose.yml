version: "3.8"

services:
  social-listening-service:
    image: ghcr.io/longluu33931/coka.social.listening:latest
    container_name: coka-social-listening-service
    ports:
      - "7572:8080"
    environment:
      - HOST_IP=192.168.1.14
    command: ["dotnet", "Coka.Social.Listening.API.dll"]
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.json:/config.json
    environment:
      - DOCKER_CONFIG=/
    command: --interval 20 --cleanup --remove-volumes
    restart: always
